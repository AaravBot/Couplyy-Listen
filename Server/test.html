<!DOCTYPE html>
<html>
<head>
  <title>Couplyy Listen Test</title>
</head>

<body>

<h2>Couplyy Listen</h2>

<audio id="audio" controls>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<br><br>

<button onclick="joinRoom()">Join Room</button>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
  const socket = io("http://localhost:5000");
  const audio = document.getElementById("audio");
  const roomId = "room1";

  let isSyncing = false;

  function joinRoom() {
    socket.emit("join_room", { roomId });
    console.log("JOINED ROOM");
  }

  audio.addEventListener("play", () => {
    if (isSyncing) return;

    socket.emit("play_song", {
      roomId,
      songId: "song1",
      currentTime: audio.currentTime
    });
  });

  audio.addEventListener("pause", () => {
    if (isSyncing) return;

    socket.emit("pause_song", {
      roomId,
      currentTime: audio.currentTime
    });
  });

  audio.addEventListener("seeked", () => {
    if (isSyncing) return;

    socket.emit("play_song", {
      roomId,
      songId: "song1",
      currentTime: audio.currentTime
    });
  });

  // 🔊 VOLUME CHANGE
  audio.addEventListener("volumechange", () => {
    socket.emit("volume_change", {
      roomId,
      volume: audio.volume
    });
  });


  socket.on("sync_state", (state) => {
    isSyncing = true;

    const delay = (Date.now() - state.lastUpdated) / 1000;
    const targetTime = state.currentTime + delay;

    if (Math.abs(audio.currentTime - targetTime) > 0.5) {
      audio.currentTime = targetTime;
    }

    if (state.isPlaying && audio.paused) {
      audio.play();
    }

    if (!state.isPlaying && !audio.paused) {
      audio.pause();
    }

    isSyncing = false;
  });

  socket.on("volume_update", ({ volume }) => {
    audio.volume = volume;
  });

</script>

</body>
</html>
